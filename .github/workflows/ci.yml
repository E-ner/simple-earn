name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci


      - name: Generate Prisma Client
        run: npx prisma generate


      - name: Type check
        run: npx tsc --noEmit


  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smartearn
          POSTGRES_PASSWORD: smartearn_pass
          POSTGRES_DB: smartearn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci


      - name: Generate Prisma Client
        run: npx prisma generate


      - name: Test Database Seeding
        run: |
          npx prisma db push
          node reset-admin.js

        env:
          DATABASE_URL: "postgresql://smartearn:smartearn_pass@localhost:5432/smartearn"

      - name: Run tests
        run: npx vitest run --coverage


  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci


      - name: Generate Prisma Client
        run: npx prisma generate


      - name: Build
        run: npm run build

        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          NEXTAUTH_SECRET: "ci-build-secret"
