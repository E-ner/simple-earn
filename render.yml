services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartearn
      POSTGRES_PASSWORD: smartearn_pass
      POSTGRES_DB: smartearn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartearn"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://smartearn:smartearn_pass@db:5432/smartearn
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change_this_in_production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      CRON_SECRET: ${CRON_SECRET:-cron_secret_change_me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-your_secure@email.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-super_secure_password}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node reset-admin.js && node server.js"

volumes:
  postgres_data:
