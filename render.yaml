services:
  - type: web
    name: simple-earn
    runtime: docker # This tells Render to look for a Dockerfile in your repo
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: simple-earn-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        value: https://simple-earn.onrender.com
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CRON_SECRET
        sync: false

databases:
  - name: simple-earn-db
    plan: free
