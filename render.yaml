services:
  - type: web
    name: simple-earn
    runtime: docker
    plan: free # or your preferred plan
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: simple-earn-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        sync: false # Set this in the Render dashboard or use generateValue: true
      - key: NEXTAUTH_URL
        value: https://simple-earn.onrender.com # Update to your real URL
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: EMAIL_SERVER_HOST
        value: smtp.gmail.com
      - key: EMAIL_SERVER_PORT
        value: "587"
      - key: EMAIL_SERVER_USER
        sync: false
      - key: EMAIL_SERVER_PASSWORD
        sync: false
      - key: EMAIL_FROM
        value: "Simple Earn <noreply@smartearn.com>"
    # Seeding and startup
    startCommand: sh -c "npx prisma migrate deploy && node reset-admin.js && node server.js"

databases:
  - name: simple-earn-db
    plan: free
