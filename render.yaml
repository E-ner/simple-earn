services:
  - type: web
    name: simple-earn
    runtime: docker # This tells Render to look for a Dockerfile in your repo
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: simple-earn-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        value: https://simple-earn.onrender.com
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: EMAIL_SERVER_HOST
        value: smtp.gmail.com
      - key: EMAIL_SERVER_PORT
        value: "587"
      - key: EMAIL_SERVER_USER
        sync: false
      - key: EMAIL_SERVER_PASSWORD
        sync: false
      - key: EMAIL_FROM
        value: "Simple Earn <noreply@smartearn.com>"
    
    # FIX: Use `dockerCommand` instead of `startCommand` for Docker runtimes
    dockerCommand: sh -c "npx prisma migrate deploy && node reset-admin.js && node server.js"

databases:
  - name: simple-earn-db
    plan: free